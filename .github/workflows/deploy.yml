name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: live

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Build frontend
        run: |
          cd client
          npm ci
          npm run build

      - name: Install Ansible
        run: |
          pip install ansible
          ansible-galaxy install -r ansible/requirements.yml

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DO_SSH_PORT }} -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass

      - name: Deploy
        run: |
          ansible-playbook -i ansible/inventory/production.yml \
            ansible/deploy.yml \
            --vault-password-file .vault_pass \
            -e "ansible_ssh_private_key_file=~/.ssh/deploy_key" \
            -e "ansible_host=${{ secrets.DO_SSH_HOST }}" \
            -e "ansible_port=${{ secrets.DO_SSH_PORT }}"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key .vault_pass
