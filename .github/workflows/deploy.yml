name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: live

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy files via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='vendor/' \
            --exclude='node_modules/' \
            --exclude='client/node_modules/' \
            --exclude='client/' \
            --exclude='logs/' \
            --exclude='tmp/' \
            --exclude='config/app_local.php' \
            --exclude='config/.env' \
            --exclude='.ddev/' \
            --exclude='docs/' \
            --exclude='tests/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o BatchMode=yes" \
            ./ ${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}:/var/www/triggertime/

      - name: Post-deploy tasks
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            ${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }} << 'ENDSSH'
            set -e
            cd /var/www/triggertime
            composer install --no-dev --optimize-autoloader --no-interaction --no-scripts
            sudo mkdir -p tmp/cache/models tmp/cache/persistent tmp/cache/views tmp/sessions tmp/tests logs
            sudo chmod -R 775 tmp logs
            sudo chown -R deploy:www-data tmp logs
            bin/cake migrations migrate --no-lock
            bin/cake cache clear_all
            rm -rf /var/www/triggertime/tmp/cache/models/*
            sudo systemctl reload php8.4-fpm
            echo "Deployment complete."
          ENDSSH
