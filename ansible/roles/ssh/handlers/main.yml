---
- name: Restart sshd
  ansible.builtin.systemd:
    name: ssh
    state: restarted

- name: Restart ssh socket
  ansible.builtin.systemd:
    daemon_reload: true
    name: ssh.socket
    state: restarted

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
